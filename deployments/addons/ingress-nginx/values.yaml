controller:
  kind: DaemonSet

  hostPort:
    enabled: true
    ports:
      http: 80
      https: 443

  service:
    type: LoadBalancer

  ingressClassResource:
    default: true
  watchIngressWithoutClass: true

  config:
    use-forwarded-headers: "true"

tcp:
  "5432": "postgres/mac-lab-db-rw:5432"
