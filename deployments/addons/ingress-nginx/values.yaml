controller:
  kind: DaemonSet

  hostPort:
    enabled: true
    ports:
      http: 80
      https: 443

  service:
    type: LoadBalancer

  ingressClassResource:
    default: true
  watchIngressWithoutClass: true

  config:
    use-forwarded-headers: "true"

  extraArgs:
    tcp-services-configmap: ingress-nginx/tcp-services
